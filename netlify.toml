[[redirects]]
  from = "/team/*"
  to = "/team.html"
  status = 200

[[redirects]]
  from = "/productions/category/*"
  to = "/productions/category/index.html"
  status = 200

[[redirects]]
  from = "/productions/*"
  to = "/productions/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/content.json"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
