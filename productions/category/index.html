<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Productions — IDILI Live &amp; Theatricals</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --cream:        #F5F0E8;
      --warm:         #EDE6D6;
      --sand:         #C9B99A;
      --taupe:        #8B7B6B;
      --charcoal:     #2C2826;
      --black:        #1A1714;
      --white:        #FAFAF8;
      --serif:        'Playfair Display', Georgia, serif;
      --sans:         'Inter', system-ui, sans-serif;
      --logo-red:     #E82020;
      --logo-orange:  #F07020;
      --logo-amber:   #F5A800;
      --logo-teal:    #009990;
      --logo-blue:    #0075BC;
    }
    html { scroll-behavior: smooth; }
    body {
      background: var(--black);
      color: var(--cream);
      font-family: var(--sans);
      font-weight: 300;
      font-size: 15px;
      line-height: 1.7;
      -webkit-font-smoothing: antialiased;
    }
    img { display: block; width: 100%; object-fit: cover; }
    a { color: inherit; text-decoration: none; }

    /* ── Nav ── */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 18px 48px;
      background: rgba(26, 23, 20, 0.97);
      backdrop-filter: blur(12px);
    }
    .nav-logo img { height: 64px; width: auto; display: block; }
    .nav-links { display: flex; gap: 36px; list-style: none; }
    .nav-links a {
      font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase;
      color: var(--cream); opacity: 0.8; transition: opacity 0.2s;
    }
    .nav-links a:hover { opacity: 1; }
    .nav-cta {
      font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase;
      border: 1px solid rgba(245,240,232,0.4); padding: 10px 22px;
      color: var(--cream); transition: background 0.25s, color 0.25s;
    }
    .nav-cta:hover { background: var(--cream); color: var(--black); }

    /* ── Category header ── */
    .cat-header {
      background: var(--black);
      padding: 160px 48px 72px;
      border-bottom: 1px solid rgba(201,185,154,0.1);
    }
    .cat-header-inner { max-width: 900px; margin: 0 auto; }
    .cat-back {
      display: inline-flex; align-items: center; gap: 8px;
      font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase;
      color: var(--sand); opacity: 0.75; margin-bottom: 48px;
      transition: opacity 0.2s;
    }
    .cat-back:hover { opacity: 1; }
    .cat-back svg { width: 14px; height: 14px; }
    .cat-num-display {
      font-size: 10px; letter-spacing: 0.24em; text-transform: uppercase;
      color: var(--taupe); margin-bottom: 16px;
    }
    .cat-bar-display { width: 36px; height: 2px; border-radius: 2px; margin-bottom: 24px; }
    .cat-title {
      font-family: var(--serif);
      font-size: clamp(40px, 6vw, 80px);
      font-weight: 700; color: var(--white); line-height: 1.0; letter-spacing: -0.02em;
      margin-bottom: 20px;
    }
    .cat-title em { font-style: italic; }
    .cat-subtitle {
      font-size: 15px; color: var(--sand); line-height: 1.75; max-width: 600px; opacity: 0.85;
    }

    /* ── Scroll arrows ── */
    .scroll-arrows { display: flex; gap: 8px; margin-bottom: 20px; }
    .scroll-btn {
      width: 36px; height: 36px; border-radius: 50%; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      border: 1px solid rgba(201,185,154,0.35); background: transparent;
      color: var(--sand); transition: background 0.2s, color 0.2s, border-color 0.2s;
    }
    .scroll-btn:hover { background: var(--sand); color: var(--black); border-color: var(--sand); }
    .scroll-btn svg { width: 14px; height: 14px; pointer-events: none; }

    /* ── Productions grid ── */
    .cat-productions { background: var(--black); padding: 64px 48px 96px; }
    .cat-productions-inner { max-width: 1200px; margin: 0 auto; }
    .prod-scroll-wrap {
      overflow-x: auto; padding-bottom: 20px;
      scrollbar-width: thin; scrollbar-color: var(--sand) transparent;
    }
    .prod-scroll-wrap::-webkit-scrollbar { height: 3px; }
    .prod-scroll-wrap::-webkit-scrollbar-thumb { background: var(--sand); border-radius: 2px; }
    .prod-grid { display: flex; gap: 3px; }
    .prod-card {
      position: relative; overflow: hidden; cursor: pointer;
      flex: 0 0 360px; height: 520px; display: block; text-decoration: none;
    }
    .prod-card img {
      position: absolute; inset: 0; width: 100%; height: 100%;
      object-fit: cover; object-position: center top;
      transition: transform 0.7s ease, filter 0.4s ease;
      filter: brightness(0.78) saturate(0.82);
    }
    .prod-card:hover img { transform: scale(1.05); filter: brightness(0.58) saturate(0.9); }
    .prod-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to top, rgba(26,23,20,0.88) 0%, transparent 55%);
      display: flex; flex-direction: column; justify-content: flex-end;
      padding: 32px;
    }
    .prod-tag {
      font-size: 9px; letter-spacing: 0.2em; text-transform: uppercase;
      color: var(--sand); margin-bottom: 8px;
    }
    .prod-name { font-size: 24px; font-weight: 500; color: var(--white); line-height: 1.15; letter-spacing: -0.01em; }
    .prod-desc {
      font-size: 12px; color: var(--sand); margin-top: 8px;
      opacity: 0; transform: translateY(8px);
      transition: opacity 0.35s, transform 0.35s; line-height: 1.6;
    }
    .prod-card:hover .prod-desc { opacity: 1; transform: translateY(0); }

    /* ── Empty state ── */
    .empty-state {
      text-align: center; padding: 80px 24px;
      color: var(--taupe); font-size: 15px;
    }

    /* ── Footer ── */
    .cat-footer {
      background: var(--black);
      border-top: 1px solid rgba(201,185,154,0.1);
      padding: 36px 48px;
    }
    .cat-footer-inner {
      max-width: 1200px; margin: 0 auto;
      display: flex; align-items: center; justify-content: space-between;
    }
    .footer-logo img { height: 52px; width: auto; display: block; opacity: 0.85; transition: opacity 0.3s; }
    .footer-logo img:hover { opacity: 1; }
    .footer-copy { font-size: 10px; color: var(--sand); opacity: 0.7; }
    .footer-back {
      font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--sand); opacity: 0.8; transition: opacity 0.2s;
    }
    .footer-back:hover { opacity: 1; }
    .footer-legal {
      background: var(--black);
      border-top: 1px solid rgba(201,185,154,0.07);
      padding: 14px 48px;
    }
    .footer-legal-inner {
      max-width: 1200px; margin: 0 auto;
      display: flex; align-items: center; justify-content: center;
      gap: 28px; flex-wrap: wrap;
    }
    .footer-legal a {
      font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--taupe); opacity: 0.65; transition: opacity 0.2s, color 0.2s;
    }
    .footer-legal a:hover { opacity: 1; color: var(--sand); }

    /* ── Mobile ── */
    @media (max-width: 900px) {
      nav { padding: 16px 24px; }
      .nav-links, .nav-cta { display: none; }
      .cat-header { padding: 120px 24px 56px; }
      .cat-productions { padding: 48px 0 72px; }
      .cat-productions-inner { max-width: 100%; }
      .prod-card { flex: 0 0 280px; height: 380px; }
      .cat-footer { padding: 28px 24px; }
      .cat-footer-inner { flex-direction: column; gap: 16px; text-align: center; }
    }
  </style>
</head>
<body>

<!-- Nav -->
<nav>
  <a href="/" class="nav-logo" aria-label="IDILI Live and Theatricals">
    <img src="/idili-logo.png" alt="IDILI" />
  </a>
  <ul class="nav-links">
    <li><a href="/#productions">Work</a></li>
    <li><a href="/#about">About</a></li>
    <li><a href="/#team">Team</a></li>
    <li><a href="/#contact">Contact</a></li>
  </ul>
  <a href="/#contact" class="nav-cta">Get in touch</a>
</nav>

<!-- Category header -->
<section class="cat-header">
  <div class="cat-header-inner">
    <a href="/" class="cat-back">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M13 8H3M7 12l-4-4 4-4"/>
      </svg>
      Back to all work
    </a>
    <p class="cat-num-display" id="cat-num">01</p>
    <div class="cat-bar-display" id="cat-bar"></div>
    <h1 class="cat-title" id="cat-title">Productions</h1>
    <p class="cat-subtitle" id="cat-subtitle"></p>
  </div>
</section>

<!-- Productions grid for this category -->
<section class="cat-productions">
  <div class="cat-productions-inner">
    <div style="display:flex; align-items:center; justify-content:flex-end; margin-bottom:20px;">
      <div class="scroll-arrows">
        <button class="scroll-btn" id="prod-prev" aria-label="Previous">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M10 12L6 8l4-4"/></svg>
        </button>
        <button class="scroll-btn" id="prod-next" aria-label="Next">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M6 4l4 4-4 4"/></svg>
        </button>
      </div>
    </div>
    <div class="prod-scroll-wrap">
      <div class="prod-grid" id="prod-grid">
        <div class="empty-state">Loading...</div>
      </div>
    </div>
  </div>
</section>

<!-- Footer -->
<footer class="cat-footer">
  <div class="cat-footer-inner">
    <a href="/" class="footer-logo">
      <img src="/idili-logo.png" alt="IDILI Live and Theatricals" />
    </a>
    <a href="/" class="footer-back">&#8592; Back to IDILI</a>
    <span class="footer-copy">&copy; 2025 IDILI Live &amp; Theatricals Ltd</span>
  </div>
</footer>

<div class="footer-legal">
  <div class="footer-legal-inner">
    <a href="/terms-conditions.html" target="_blank" rel="noopener">Terms &amp; Conditions</a>
    <a href="/privacy-policy.html" target="_blank" rel="noopener">Privacy Policy</a>
    <a href="/cookie-policy.html" target="_blank" rel="noopener">Cookie Policy</a>
  </div>
</div>

<script>
  var CATEGORIES = {
    'theatrical': {
      num: '01', name: 'Theatrical',
      color: '#E82020',
      tags: ['Theatrical', 'Musical Theatre', 'Musical'],
      desc: 'From West End premieres to record-breaking anniversary tours, we produce theatrical experiences that define their era.'
    },
    'classical': {
      num: '02', name: 'Opera &amp; Classical',
      color: '#009990',
      tags: ['Opera', 'Classical'],
      desc: "International tours and concert presentations with the world's finest operatic voices and orchestras."
    },
    'exhibitions': {
      num: '03', name: 'Exhibitions &amp; Other Experiences',
      color: '#0075BC',
      tags: ['Exhibition', 'Immersive'],
      desc: 'Landmark cultural exhibitions and immersive experiences that bring iconic artists and stories to life for new and existing audiences.'
    }
  };

  var parts = window.location.pathname.replace(/\/$/, '').split('/');
  var categorySlug = parts[parts.length - 1];
  var cat = CATEGORIES[categorySlug];

  if (!cat) {
    window.location.href = '/';
  } else {
    document.title = cat.name.replace(/&amp;/g, '&') + ' — IDILI Live & Theatricals';
    document.getElementById('cat-num').textContent = cat.num;
    document.getElementById('cat-bar').style.background = cat.color;
    document.getElementById('cat-title').innerHTML = cat.name;
    document.getElementById('cat-subtitle').innerHTML = cat.desc;

    document.getElementById('prod-prev').addEventListener('click', function() {
      document.querySelector('.prod-scroll-wrap').scrollBy({ left: -370, behavior: 'smooth' });
    });
    document.getElementById('prod-next').addEventListener('click', function() {
      document.querySelector('.prod-scroll-wrap').scrollBy({ left: 370, behavior: 'smooth' });
    });

    fetch('/content.json')
      .then(function(r) { return r.json(); })
      .then(function(d) {
        function esc(s) { return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

        var all = d.productions || [];
        var filtered = all.filter(function(p) {
          var tag = (p.tag || '').toLowerCase();
          return cat.tags.some(function(t) { return tag.includes(t.toLowerCase()); });
        });

        var grid = document.getElementById('prod-grid');

        if (filtered.length === 0) {
          grid.innerHTML = '<div class="empty-state">No productions found in this category yet.</div>';
          return;
        }

        grid.innerHTML = filtered.map(function(p) {
          var href = p.slug ? '/productions/' + p.slug : '/';
          var cardImg = p.thumbnail || p.image;
          return '<a class="prod-card" href="' + href + '">' +
            '<img src="' + esc(cardImg) + '" alt="' + esc(p.title) + '" loading="lazy" />' +
            '<div class="prod-overlay">' +
              '<span class="prod-tag">' + esc(p.tag) + '</span>' +
              '<h2 class="prod-name">' + esc(p.title) + '</h2>' +
              '<p class="prod-desc">' + esc(p.description) + '</p>' +
            '</div>' +
          '</a>';
        }).join('');
      })
      .catch(function() {
        document.getElementById('prod-grid').innerHTML =
          '<div class="empty-state">Unable to load productions. Please try again.</div>';
      });
  }
</script>

</body>
</html>
