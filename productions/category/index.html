<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Productions — IDILI Live &amp; Theatricals</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --cream: #F5F0E8; --warm: #EDE6D6; --sand: #C9B99A; --taupe: #8B7B6B;
      --charcoal: #2C2826; --black: #1A1714; --white: #FAFAF8;
      --serif: 'Playfair Display', Georgia, serif; --sans: 'Inter', system-ui, sans-serif;
      --logo-red: #E82020; --logo-orange: #F07020; --logo-amber: #F5A800;
      --logo-teal: #009990; --logo-blue: #0075BC;
    }
    html { scroll-behavior: smooth; }
    body { background: var(--black); color: var(--cream); font-family: var(--sans); font-weight: 300; font-size: 15px; line-height: 1.7; -webkit-font-smoothing: antialiased; }
    img { display: block; width: 100%; object-fit: cover; }
    a { color: inherit; text-decoration: none; }
    nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; display: flex; align-items: center; justify-content: space-between; padding: 18px 48px; background: rgba(26,23,20,0.97); backdrop-filter: blur(12px); }
    .nav-logo img { height: 64px; width: auto; display: block; }
    .nav-links { display: flex; gap: 36px; list-style: none; }
    .nav-links a { font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--white); font-weight: 500; opacity: 1; transition: opacity 0.2s; }
    .nav-links a:hover { opacity: 0.75; }
    .nav-cta { font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; font-weight: 500; border: 1px solid rgba(250,250,248,0.65); padding: 10px 22px; color: var(--white); transition: background 0.25s, color 0.25s; }
    .nav-cta:hover { background: var(--white); color: var(--black); }
    .cat-header { background: var(--black); padding: 160px 48px 72px; border-bottom: 1px solid rgba(201,185,154,0.1); }
    .cat-header-inner { max-width: 900px; margin: 0 auto; }
    .cat-back { display: inline-flex; align-items: center; gap: 8px; font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--sand); opacity: 0.75; margin-bottom: 48px; transition: opacity 0.2s; }
    .cat-back:hover { opacity: 1; }
    .cat-back svg { width: 14px; height: 14px; }
    .cat-num-display { font-size: 10px; letter-spacing: 0.24em; text-transform: uppercase; color: var(--taupe); margin-bottom: 16px; }
    .cat-bar-display { width: 36px; height: 2px; border-radius: 2px; margin-bottom: 24px; }
    .cat-title { font-family: var(--serif); font-size: clamp(40px, 6vw, 80px); font-weight: 700; color: var(--white); line-height: 1.0; letter-spacing: -0.02em; margin-bottom: 20px; }
    .cat-subtitle { font-size: 15px; color: var(--sand); line-height: 1.75; max-width: 600px; opacity: 0.85; }
    .scroll-arrows { display: flex; gap: 8px; margin-bottom: 20px; }
    .scroll-btn { width: 36px; height: 36px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; border: 1px solid rgba(201,185,154,0.35); background: transparent; color: var(--sand); transition: background 0.2s, color 0.2s, border-color 0.2s; }
    .scroll-btn:hover { background: var(--sand); color: var(--black); border-color: var(--sand); }
    .scroll-btn svg { width: 14px; height: 14px; pointer-events: none; }
    .cat-productions { background: var(--black); padding: 64px 48px 96px; }
    .cat-productions-inner { max-width: 1200px; margin: 0 auto; }
    .prod-scroll-wrap { overflow-x: auto; padding-bottom: 20px; scrollbar-width: thin; scrollbar-color: var(--sand) transparent; }
    .prod-scroll-wrap::-webkit-scrollbar { height: 3px; }
    .prod-scroll-wrap::-webkit-scrollbar-thumb { background: var(--sand); border-radius: 2px; }
    .prod-grid { display: flex; gap: 3px; }
    .prod-card { position: relative; overflow: hidden; cursor: pointer; flex: 0 0 360px; height: 520px; display: block; text-decoration: none; }
    .prod-card img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; transition: transform 0.7s ease, filter 0.4s ease; filter: brightness(0.78) saturate(0.82); }
    .prod-card:hover img { transform: scale(1.05); filter: brightness(0.58) saturate(0.9); }
    .prod-overlay { position: absolute; inset: 0; background: linear-gradient(to top, rgba(26,23,20,0.88) 0%, transparent 55%); display: flex; flex-direction: column; justify-content: flex-end; padding: 32px; }
    .prod-tag { font-size: 9px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--sand); margin-bottom: 8px; }
    .prod-name { font-size: 24px; font-weight: 500; color: var(--white); line-height: 1.15; letter-spacing: -0.01em; }
    .prod-desc { font-size: 12px; color: var(--sand); margin-top: 8px; opacity: 0; transform: translateY(8px); transition: opacity 0.35s, transform 0.35s; line-height: 1.6; }
    .prod-card:hover .prod-desc { opacity: 1; transform: translateY(0); }
    .empty-state { text-align: center; padding: 80px 24px; color: var(--taupe); font-size: 15px; }
    .cat-footer { background: var(--black); border-top: 1px solid rgba(201,185,154,0.1); padding: 36px 48px; }
    .cat-footer-inner { max-width: 1200px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; }
    .footer-logo img { height: 52px; width: auto; display: block; opacity: 0.85; transition: opacity 0.3s; }
    .footer-logo img:hover { opacity: 1; }
    .footer-copy { font-size: 10px; color: var(--sand); opacity: 0.7; }
    .footer-back { font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--sand); opacity: 0.8; transition: opacity 0.2s; }
    .footer-back:hover { opacity: 1; }
    .footer-legal { background: var(--black); border-top: 1px solid rgba(201,185,154,0.07); padding: 14px 48px; }
    .footer-legal-inner { max-width: 1200px; margin: 0 auto; display: flex; align-items: center; justify-content: center; gap: 28px; flex-wrap: wrap; }
    .footer-legal a { font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--taupe); opacity: 0.65; transition: opacity 0.2s, color 0.2s; }
    .footer-legal a:hover { opacity: 1; color: var(--sand); }
    @media (max-width: 900px) {
      nav { padding: 16px 24px; } .nav-links, .nav-cta { display: none; }
      .cat-header { padding: 120px 24px 56px; }
      .cat-productions { padding: 48px 0 72px; } .cat-productions-inner { max-width: 100%; }
      .prod-card { flex: 0 0 280px; height: 380px; }
      .cat-footer { padding: 28px 24px; } .cat-footer-inner { flex-direction: column; gap: 16px; text-align: center; }
    }
  </style>
</head>
<body>
<nav>
  <a href="/" class="nav-logo"><img src="/idili-logo.png" alt="IDILI" /></a>
  <ul class="nav-links">
    <li><a href="/#productions">Work</a></li>
    <li><a href="/#about">About</a></li>
    <li><a href="/#team">Team</a></li>
    <li><a href="/#contact">Contact</a></li>
  </ul>
  <a href="/#contact" class="nav-cta">Get in touch</a>
</nav>
<section class="cat-header">
  <div class="cat-header-inner">
    <a href="/" class="cat-back">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M13 8H3M7 12l-4-4 4-4"/></svg>
      Back to all work
    </a>
    <p class="cat-num-display" id="cat-num">01</p>
    <div class="cat-bar-display" id="cat-bar"></div>
    <h1 class="cat-title" id="cat-title">Productions</h1>
    <p class="cat-subtitle" id="cat-subtitle"></p>
  </div>
</section>
<section class="cat-productions">
  <div class="cat-productions-inner">
    <div style="display:flex; align-items:center; justify-content:flex-end; margin-bottom:20px;">
      <div class="scroll-arrows">
        <button class="scroll-btn" id="prod-prev" aria-label="Previous">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M10 12L6 8l4-4"/></svg>
        </button>
        <button class="scroll-btn" id="prod-next" aria-label="Next">
