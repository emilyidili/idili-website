<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Production — IDILI Live &amp; Theatricals</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,700;1,400;1,500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --cream:    #F5F0E8;
      --warm:     #EDE6D6;
      --sand:     #C9B99A;
      --taupe:    #8B7B6B;
      --charcoal: #2C2826;
      --black:    #1A1714;
      --white:    #FAFAF8;
      --accent:   #F07020;
      --serif:    'Playfair Display', Georgia, serif;
      --sans:     'Inter', system-ui, sans-serif;
      --logo-orange: #F07020;
      --logo-amber:  #F5A800;
      --logo-teal:   #009990;
    }
    html { scroll-behavior: smooth; }
    body {
      background: var(--black);
      color: var(--cream);
      font-family: var(--sans);
      font-weight: 300;
      font-size: 15px;
      line-height: 1.7;
      -webkit-font-smoothing: antialiased;
    }
    img { display: block; width: 100%; object-fit: cover; }
    a { color: inherit; text-decoration: none; }

    /* ── Nav ── */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 48px;
      background: rgba(26, 23, 20, 0.97);
      backdrop-filter: blur(12px);
    }
    .nav-logo img {
      height: 64px;
      width: auto;
      display: block;
    }
    .nav-links {
      display: flex;
      gap: 36px;
      list-style: none;
    }
    .nav-links a {
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--cream);
      opacity: 0.8;
      transition: opacity 0.2s;
    }
    .nav-links a:hover { opacity: 1; }
    .nav-cta {
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      border: 1px solid rgba(245,240,232,0.4);
      padding: 10px 22px;
      color: var(--cream);
      transition: background 0.25s, color 0.25s;
    }
    .nav-cta:hover { background: var(--cream); color: var(--black); }

    /* ── Hero ── */
    .prod-hero {
      position: relative;
      height: 100vh;
      min-height: 580px;
      overflow: hidden;
    }
    .prod-hero-img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center 30%;
      filter: brightness(0.82) saturate(0.88);
    }
    .prod-hero-overlay {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(to top, rgba(26,23,20,0.82) 0%, rgba(26,23,20,0.18) 50%, rgba(26,23,20,0.08) 100%),
        linear-gradient(to right, rgba(26,23,20,0.38) 0%, transparent 55%);
    }
    .prod-hero-content {
      position: relative;
      z-index: 2;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 0 48px 72px;
      max-width: 900px;
    }
    .prod-back {
      position: absolute;
      top: 110px;
      left: 48px;
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--sand);
      opacity: 0.8;
      transition: opacity 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .prod-back:hover { opacity: 1; }
    .prod-back svg { width: 14px; height: 14px; }
    .prod-tag {
      font-size: 10px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--logo-amber);
      margin-bottom: 16px;
      display: block;
    }
    .prod-title {
      font-family: var(--serif);
      font-size: clamp(40px, 6vw, 84px);
      font-weight: 700;
      color: var(--white);
      line-height: 1.05;
      letter-spacing: -0.01em;
    }
    .prod-title em { font-style: italic; font-weight: 400; color: var(--logo-amber); }

    /* ── Body ── */
    .prod-body {
      background: var(--white);
      padding: 96px 48px;
    }
    .prod-body-inner {
      max-width: 780px;
      margin: 0 auto;
    }
    .section-label {
      font-size: 9px;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      color: var(--taupe);
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 28px;
    }
    .section-label::before {
      content: '';
      display: block;
      width: 32px;
      height: 1px;
      background: var(--sand);
      opacity: 0.5;
    }
    .prod-long-desc {
      font-family: var(--serif);
      font-size: clamp(17px, 2vw, 21px);
      font-weight: 300;
      color: var(--charcoal);
      line-height: 1.8;
      white-space: pre-line;
    }
    .prod-short-desc {
      font-size: 14px;
      color: var(--taupe);
      line-height: 1.9;
      margin-top: 24px;
    }

    /* ── Gallery ── */
    .prod-gallery {
      background: var(--black);
      padding: 96px 48px;
    }
    .prod-gallery-inner {
      max-width: 1200px;
      margin: 0 auto;
    }
    .prod-gallery-label {
      font-size: 9px;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      color: var(--sand);
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 40px;
      opacity: 0.7;
    }
    .prod-gallery-label::before {
      content: '';
      display: block;
      width: 32px;
      height: 1px;
      background: var(--sand);
      opacity: 0.5;
    }
    .prod-gallery-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 3px;
    }
    .gallery-item {
      overflow: hidden;
      aspect-ratio: 4 / 3;
      cursor: pointer;
    }
    .gallery-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.6s ease, filter 0.4s ease;
      filter: brightness(0.85) saturate(0.9);
    }
    .gallery-item:hover img {
      transform: scale(1.04);
      filter: brightness(1) saturate(1);
    }

    /* ── Lightbox ── */
    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 200;
      background: rgba(10, 10, 10, 0.95);
      align-items: center;
      justify-content: center;
      cursor: zoom-out;
    }
    .lightbox.open { display: flex; }
    .lightbox img {
      max-width: 90vw;
      max-height: 88vh;
      width: auto;
      height: auto;
      object-fit: contain;
      cursor: default;
    }
    .lightbox-close {
      position: absolute;
      top: 24px;
      right: 32px;
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--sand);
      cursor: pointer;
      opacity: 0.7;
      transition: opacity 0.2s;
    }
    .lightbox-close:hover { opacity: 1; }

    /* ── Footer ── */
    .prod-footer {
      background: var(--black);
      border-top: 1px solid rgba(201,185,154,0.1);
      padding: 36px 48px;
    }
    .prod-footer-inner {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .footer-logo img {
      height: 52px;
      width: auto;
      display: block;
      opacity: 0.85;
      transition: opacity 0.3s;
    }
    .footer-logo img:hover { opacity: 1; }
    .footer-copy {
      font-size: 10px;
      color: var(--sand);
      opacity: 0.7;
    }
    .footer-back {
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--sand);
      opacity: 0.8;
      transition: opacity 0.2s;
    }
    .footer-back:hover { opacity: 1; }

    /* ── Loading state ── */
    .loading-state {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: var(--serif);
      font-size: 18px;
      color: var(--taupe);
      letter-spacing: 0.08em;
    }

    /* ── Mobile ── */
    @media (max-width: 900px) {
      nav { padding: 16px 24px; }
      .nav-links, .nav-cta { display: none; }
      .prod-hero-content { padding: 0 24px 56px; }
      .prod-back { left: 24px; top: 90px; }
      .prod-body { padding: 64px 24px; }
      .prod-gallery { padding: 64px 24px; }
      .prod-gallery-grid { grid-template-columns: repeat(2, 1fr); }
      .prod-footer { padding: 28px 24px; }
      .prod-footer-inner { flex-direction: column; gap: 16px; text-align: center; }
    }
    @media (max-width: 560px) {
      .prod-gallery-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<!-- Nav -->
<nav>
  <a href="/" class="nav-logo" aria-label="IDILI Live and Theatricals">
    <img src="/idili-logo.png" alt="IDILI" />
  </a>
  <ul class="nav-links">
    <li><a href="/#productions">Work</a></li>
    <li><a href="/#about">About</a></li>
    <li><a href="/#team">Team</a></li>
    <li><a href="/#contact">Contact</a></li>
  </ul>
  <a href="/#contact" class="nav-cta">Get in touch</a>
</nav>

<!-- Hero -->
<section class="prod-hero" id="prod-hero">
  <img class="prod-hero-img" id="prod-hero-img" src="" alt="" />
  <div class="prod-hero-overlay"></div>
  <div class="prod-hero-content">
    <a href="/#productions" class="prod-back">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M13 8H3M7 12l-4-4 4-4"/>
      </svg>
      All productions
    </a>
    <span class="prod-tag" id="prod-tag"></span>
    <h1 class="prod-title" id="prod-title"></h1>
  </div>
</section>

<!-- Description -->
<section class="prod-body" id="prod-body-section">
  <div class="prod-body-inner">
    <p class="section-label">About this production</p>
    <p class="prod-long-desc" id="prod-long-desc"></p>
  </div>
</section>

<!-- Gallery -->
<section class="prod-gallery" id="prod-gallery-section" style="display:none;">
  <div class="prod-gallery-inner">
    <p class="prod-gallery-label">Gallery</p>
    <div class="prod-gallery-grid" id="prod-gallery-grid"></div>
  </div>
</section>

<!-- Lightbox -->
<div class="lightbox" id="lightbox">
  <span class="lightbox-close" id="lightbox-close">Close &times;</span>
  <img id="lightbox-img" src="" alt="" />
</div>

<!-- Footer -->
<footer class="prod-footer">
  <div class="prod-footer-inner">
    <a href="/" class="footer-logo">
      <img src="/idili-logo.png" alt="IDILI Live and Theatricals" />
    </a>
    <a href="/#productions" class="footer-back">&#8592; Back to all productions</a>
    <span class="footer-copy">&copy; 2024 IDILI Live &amp; Theatricals Ltd</span>
  </div>
</footer>

<script>
  // Read slug from URL: /productions/mamma-mia-the-party → mamma-mia-the-party
  var slug = window.location.pathname.replace(/^\/productions\/?/, '').replace(/\/$/, '');

  fetch('/content.json')
    .then(function(r) { return r.json(); })
    .then(function(d) {
      var prod = null;
      if (d.productions) {
        for (var i = 0; i < d.productions.length; i++) {
          if (d.productions[i].slug === slug) { prod = d.productions[i]; break; }
        }
      }

      if (!prod) {
        // Production not found — go home
        window.location.href = '/';
        return;
      }

      // Page title
      document.title = prod.title + ' — IDILI Live & Theatricals';

      // Hero
      var heroImg = document.getElementById('prod-hero-img');
      if (prod.image) { heroImg.src = prod.image; heroImg.alt = prod.title; }
      document.getElementById('prod-tag').textContent = prod.tag || '';
      // Title — preserve any italic markers if needed, otherwise plain text
      document.getElementById('prod-title').textContent = prod.title || '';

      // Description
      var longDesc = document.getElementById('prod-long-desc');
      if (prod.long_description && prod.long_description.trim()) {
        longDesc.textContent = prod.long_description;
      } else if (prod.description) {
        longDesc.textContent = prod.description;
        longDesc.style.fontSize = '18px';
      }

      // Gallery
      var gallery = prod.gallery;
      if (gallery && gallery.length > 0) {
        var gallerySection = document.getElementById('prod-gallery-section');
        var galleryGrid = document.getElementById('prod-gallery-grid');
        gallerySection.style.display = '';

        galleryGrid.innerHTML = gallery.map(function(item, idx) {
          // Handle both flat string array and array of objects
          var src = (typeof item === 'string') ? item : (item.image || item);
          return '<div class="gallery-item" data-src="' + src + '" data-idx="' + idx + '">' +
            '<img src="' + src + '" alt="' + prod.title + ' — photo ' + (idx + 1) + '" loading="lazy" />' +
          '</div>';
        }).join('');

        // Lightbox
        var lightbox = document.getElementById('lightbox');
        var lightboxImg = document.getElementById('lightbox-img');
        galleryGrid.querySelectorAll('.gallery-item').forEach(function(item) {
          item.addEventListener('click', function() {
            lightboxImg.src = item.getAttribute('data-src');
            lightbox.classList.add('open');
          });
        });
        document.getElementById('lightbox-close').addEventListener('click', function() {
          lightbox.classList.remove('open');
        });
        lightbox.addEventListener('click', function(e) {
          if (e.target === lightbox) lightbox.classList.remove('open');
        });
        document.addEventListener('keydown', function(e) {
          if (e.key === 'Escape') lightbox.classList.remove('open');
        });
      }
    })
    .catch(function() {
      window.location.href = '/';
    });
</script>

</body>
</html>
