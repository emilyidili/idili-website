backend:
  name: git-gateway
  branch: main

media_folder: "images"
public_folder: "/images"

collections:
  - name: "content"
    label: "Site Content"
    files:
      - name: "main"
        label: "Main Page"
        file: "content.json"
        fields:

          - label: "Hero Section"
            name: "hero"
            widget: "object"
            fields:
              - { label: "Eyebrow Text", name: "eyebrow", widget: "string" }
              - { label: "Title (first part)", name: "title", widget: "string", hint: "e.g. Every night is" }
              - { label: "Title (italic part)", name: "title_em", widget: "string", hint: "e.g. opening night." }
              - { label: "Subtitle Paragraph", name: "subtitle", widget: "text" }
              - { label: "Hero Image", name: "image", widget: "image", required: false }
              - { label: "Hero Video URL", name: "video_url", widget: "string", required: false, hint: "Paste a direct .mp4 URL to use video instead of the hero image. Leave blank to use the image above." }

          - label: "About Section"
            name: "intro"
            widget: "object"
            fields:
              - { label: "Heading (first part)", name: "heading", widget: "string" }
              - { label: "Heading (italic part)", name: "heading_em", widget: "string" }
              - { label: "Paragraph 1", name: "body1", widget: "text", required: false }
              - { label: "Paragraph 2", name: "body2", widget: "text", required: false }
              - { label: "Stat 1 — Number", name: "stat1_num", widget: "string" }
              - { label: "Stat 1 — Label", name: "stat1_label", widget: "string" }
              - { label: "Stat 2 — Number", name: "stat2_num", widget: "string" }
              - { label: "Stat 2 — Label", name: "stat2_label", widget: "string" }
              - { label: "Stat 3 — Number", name: "stat3_num", widget: "string" }
              - { label: "Stat 3 — Label", name: "stat3_label", widget: "string" }

          - label: "About (extended copy)"
            name: "about"
            widget: "object"
            fields:
              - { label: "Heading (first part)", name: "heading", widget: "string" }
              - { label: "Heading (italic part)", name: "heading_em", widget: "string" }
              - { label: "Paragraph 1 — Ingrid", name: "body1", widget: "text", required: false }
              - { label: "Paragraph 2 — Miguel", name: "body2", widget: "text", required: false }
              - { label: "Pull Quote", name: "quote", widget: "text", required: false }
              - { label: "Paragraph 3 — Team", name: "body3", widget: "text", required: false }
              - { label: "Photo", name: "image", widget: "image", required: false }

          - label: "Category Cards"
            name: "categories"
            widget: "object"
            fields:
              - label: "Theatrical"
                name: "theatrical"
                widget: "object"
                fields:
                  - { label: "Card Name", name: "name", widget: "string" }
                  - { label: "Card Description", name: "desc", widget: "text" }
                  - { label: "Card Image", name: "image", widget: "image", required: false, hint: "Optional — if left blank, the first Theatrical production image is used automatically" }
              - label: "Opera & Classical"
                name: "classical"
                widget: "object"
                fields:
                  - { label: "Card Name", name: "name", widget: "string" }
                  - { label: "Card Description", name: "desc", widget: "text" }
                  - { label: "Card Image", name: "image", widget: "image", required: false, hint: "Optional — if left blank, the first Opera & Classical production image is used automatically" }
              - label: "Exhibitions & Other Experiences"
                name: "exhibitions"
                widget: "object"
                fields:
                  - { label: "Card Name", name: "name", widget: "string" }
                  - { label: "Card Description", name: "desc", widget: "text" }
                  - { label: "Card Image", name: "image", widget: "image", required: false, hint: "Optional — if left blank, the first Exhibitions production image is used automatically" }

          - label: "Productions"
            name: "productions"
            widget: "list"
            label_singular: "Production"
            fields:
              - { label: "Category Tag", name: "tag", widget: "string", hint: "Theatrical | Opera & Classical | Exhibitions & Other Experiences" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Short Description", name: "description", widget: "text", hint: "One or two lines shown on the category page card" }
              - { label: "Thumbnail Image", name: "thumbnail", widget: "image", required: false, hint: "Optional square-ish image used on the category page card. If blank, the full image below is used instead." }
              - { label: "Full-Bleed Image", name: "image", widget: "image", hint: "Main production image — used on the production detail page and as the category homepage card if no thumbnail is set" }
              - { label: "URL Slug", name: "slug", widget: "string", hint: "URL-friendly name — lowercase, hyphens only. e.g. mamma-mia-the-party" }
              - { label: "Full Story", name: "long_description", widget: "text", required: false, hint: "Longer write-up shown on the production's own page" }
              - label: "Gallery"
                name: "gallery"
                widget: "list"
                label_singular: "Photo"
                required: false
                hint: "Upload photos for the production's gallery page"
                field: { label: "Photo", name: "image", widget: "image" }

          - label: "Team"
            name: "team"
            widget: "list"
            label_singular: "Team Member"
            fields:
              - { label: "Full Name", name: "name", widget: "string" }
              - { label: "Job Title", name: "role", widget: "string" }
              - { label: "Short Bio", name: "bio", widget: "text", required: false, hint: "Optional biography shown on the team member's profile page" }
              - { label: "Photo", name: "photo", widget: "image" }

          - label: "Venues & Partners"
            name: "venues"
            widget: "list"
            label_singular: "Venue or Partner"
            field: { label: "Name", name: "item", widget: "string" }

          - label: "Contact"
            name: "contact"
            widget: "object"
            fields:
              - { label: "Email Address", name: "email", widget: "string" }
              - { label: "Based In", name: "based", widget: "string" }
              - { label: "London Address", name: "london_address", widget: "string", required: false, hint: "e.g. 10 Somewhere Street, London W1A 1AA" }
              - { label: "Paris Address", name: "paris_address", widget: "string", required: false, hint: "e.g. 5 Rue de Somewhere, 75001 Paris" }
