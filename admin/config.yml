backend:
  name: git-gateway
  branch: main

media_folder: "images"
public_folder: "/images"

collections:
  - name: "content"
    label: "Site Content"
    files:
      - name: "main"
        label: "Main Page"
        file: "content.json"
        fields:

          - label: "Hero Section"
            name: "hero"
            widget: "object"
            fields:
              - { label: "Eyebrow Text", name: "eyebrow", widget: "string" }
              - { label: "Title (first part)", name: "title", widget: "string", hint: "e.g. Every night is" }
              - { label: "Title (italic part)", name: "title_em", widget: "string", hint: "e.g. opening night." }
              - { label: "Subtitle Paragraph", name: "subtitle", widget: "text" }
              - { label: "Hero Image", name: "image", widget: "image" }

          - label: "About Section"
            name: "intro"
            widget: "object"
            fields:
              - { label: "Heading (first part)", name: "heading", widget: "string" }
              - { label: "Heading (italic part)", name: "heading_em", widget: "string" }
              - { label: "Paragraph 1", name: "body1", widget: "text" }
              - { label: "Paragraph 2", name: "body2", widget: "text" }
              - { label: "Stat 1 — Number", name: "stat1_num", widget: "string" }
              - { label: "Stat 1 — Label", name: "stat1_label", widget: "string" }
              - { label: "Stat 2 — Number", name: "stat2_num", widget: "string" }
              - { label: "Stat 2 — Label", name: "stat2_label", widget: "string" }
              - { label: "Stat 3 — Number", name: "stat3_num", widget: "string" }
              - { label: "Stat 3 — Label", name: "stat3_label", widget: "string" }

          - label: "About (extended copy)"
            name: "about"
            widget: "object"
            fields:
              - { label: "Heading (first part)", name: "heading", widget: "string" }
              - { label: "Heading (italic part)", name: "heading_em", widget: "string" }
              - { label: "Paragraph 1 — Ingrid", name: "body1", widget: "text" }
              - { label: "Paragraph 2 — Miguel", name: "body2", widget: "text" }
              - { label: "Pull Quote", name: "quote", widget: "text" }
              - { label: "Paragraph 3 — Team", name: "body3", widget: "text" }
              - { label: "Photo", name: "image", widget: "image" }

          - label: "Productions"
            name: "productions"
            widget: "list"
            label_singular: "Production"
            summary:
